name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # Charter §8 / spec 000 criterion 7: runtime dependency surface is
      # exactly react, react-dom, and the MDX runtime.
      - name: Check runtime dependencies
        run: |
          npm ls --omit=dev --depth=0
          node -e "
            const deps = Object.keys(require('./package.json').dependencies).sort();
            const allowed = ['@mdx-js/react', 'react', 'react-dom'];
            if (deps.join() !== allowed.join()) {
              console.error('Unexpected runtime dependencies:', deps);
              process.exit(1);
            }
          "

      - name: Unit tests
        run: npx vitest run

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Smoke harness
        run: npx playwright test

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
