<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Interactive lessons on the physics of software, for people directing AI coding agents."
    />
    <title>Groundwork</title>
    <script>
      // Set the theme before first paint to avoid a flash of wrong theme.
      // Initial value follows the device; localStorage wins once toggled.
      (function () {
        var stored = null;
        try {
          stored = localStorage.getItem('gw.theme.v1');
        } catch (e) {}
        var theme =
          stored === 'light' || stored === 'dark'
            ? stored
            : window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
